workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: stuartepworth
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sondare.app
      vars:
        EXPO_TOKEN: $EXPO_TOKEN
        APPLE_ID: $APPLE_ID
        ASC_APP_ID: $ASC_APP_ID
        APPLE_TEAM_ID: $APPLE_TEAM_ID
      node: 20.11.1
      xcode: 15.4
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Install EAS CLI
        script: |
          npm install -g eas-cli
      - name: Build iOS app with EAS
        script: |
          eas build --platform ios --profile production --non-interactive --wait
      - name: Download build artifact
        script: |
          eas build:download --platform ios --profile production --output=$CM_BUILD_DIR
    artifacts:
      - '*.ipa'
    publishing:
      email:
        recipients:
          - your-email@example.com
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
