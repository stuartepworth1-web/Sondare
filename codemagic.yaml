workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sondare.app
      xcode: latest
      cocoapods: default
      vars:
        EXPO_TOKEN: $EXPO_TOKEN
        APP_STORE_ID: $APP_STORE_ID
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID
        APP_STORE_CONNECT_KEY_IDENTIFIER: $APP_STORE_CONNECT_KEY_IDENTIFIER
        APP_STORE_CONNECT_PRIVATE_KEY: $APP_STORE_CONNECT_PRIVATE_KEY
      node: 20.19.4
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Prebuild iOS project
        script: |
          npm run prebuild:ios
      - name: Set build number
        script: |
          cd ios && agvtool new-version -all $(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_ID") + 1))
      - name: Create export options
        script: |
          cat > /Users/builder/export_options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>teamID</key>
              <string>\$TEAM_ID</string>
          </dict>
          </plist>
          EOF
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace ios/sondare.xcworkspace \
            --scheme sondare \
            --archive-flags="-allowProvisioningUpdates" \
            --export-options-plist /Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      android_signing:
        - keystore_reference
      vars:
        EXPO_TOKEN: $EXPO_TOKEN
      node: 20.19.4
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Prebuild Android project
        script: |
          npm run prebuild:android
      - name: Set build number
        script: |
          cd android && ./gradlew bundleRelease \
            -PversionCode=$(($(google-play get-latest-build-number --package-name "com.sondare.app") + 1))
      - name: Build Android
        script: |
          cd android && ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
