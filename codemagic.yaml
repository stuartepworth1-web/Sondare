workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.stuartepworth.sondare
      vars:
        EXPO_TOKEN: $EXPO_TOKEN
      node: 18.20.5
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Prebuild iOS project
        script: |
          npx expo prebuild --platform ios --clean --no-install
      - name: Set build number
        script: |
          cd ios && agvtool new-version -all $(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_ID") + 1))
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace ios/sondare.xcworkspace \
            --scheme sondare
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      android_signing:
        - keystore_reference
      vars:
        EXPO_TOKEN: $EXPO_TOKEN
      node: 18.20.5
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Prebuild Android project
        script: |
          npx expo prebuild --platform android --clean --no-install
      - name: Set build number
        script: |
          cd android && ./gradlew bundleRelease \
            -PversionCode=$(($(google-play get-latest-build-number --package-name "com.stuartepworth.sondare") + 1))
      - name: Build Android
        script: |
          cd android && ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
