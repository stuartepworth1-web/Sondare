workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sondare.app
      xcode: latest
      cocoapods: default
      vars:
        EXPO_TOKEN: $EXPO_TOKEN
        APP_STORE_ID: $APP_STORE_ID
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID
        APP_STORE_CONNECT_KEY_IDENTIFIER: $APP_STORE_CONNECT_KEY_IDENTIFIER
        P8_KEY_PART1: $P8_KEY_PART1
        P8_KEY_PART2: $P8_KEY_PART2
        P8_KEY_PART3: $P8_KEY_PART3
        P8_KEY_PART4: $P8_KEY_PART4
        P8_KEY_PART5: $P8_KEY_PART5
      node: 20.19.4
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $HOME/.cocoapods/repos
        - ios/Pods
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Prebuild iOS project
        script: |
          set -e
          export EXPO_NO_DOTENV=1
          export NODE_ENV=production

          echo "Starting Expo prebuild..."

          # Run prebuild without pod install first
          npx expo prebuild --platform ios --clean --no-install

          echo "✓ Prebuild completed, now installing pods..."
      - name: Install CocoaPods dependencies
        script: |
          set -e
          cd ios

          echo "Installing pods..."
          pod install --repo-update

          if [ -d "Pods" ]; then
            echo "✓ CocoaPods installation completed successfully"
            echo "Installed pods:"
            ls -la Pods/ | head -20
          else
            echo "✗ Pods directory not created"
            exit 1
          fi
      - name: Create export options
        script: |
          cat > /Users/builder/export_options.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>provisioningProfiles</key>
            <dict/>
          </dict>
          </plist>
          EOF
      - name: Set build number
        script: |
          cd ios && agvtool new-version -all $(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_ID") + 1))
      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles
      - name: Setup private key
        script: |
          set -e
          echo "Setting up App Store Connect API key..."

          # Debug: Check each part
          echo "Part 1 length: ${#P8_KEY_PART1}"
          echo "Part 2 length: ${#P8_KEY_PART2}"
          echo "Part 3 length: ${#P8_KEY_PART3}"
          echo "Part 4 length: ${#P8_KEY_PART4}"
          echo "Part 5 length: ${#P8_KEY_PART5}"

          # Reassemble the .p8 key from multiple parts
          FULL_KEY="${P8_KEY_PART1}${P8_KEY_PART2}${P8_KEY_PART3}${P8_KEY_PART4}${P8_KEY_PART5}"

          if [ -z "$FULL_KEY" ]; then
            echo "✗ P8_KEY_PART variables not set"
            exit 1
          fi

          echo "✓ Reassembled key from parts (total length: ${#FULL_KEY} chars)"

          # Check if length is reasonable (should be ~400-500 chars for base64 .p8)
          if [ ${#FULL_KEY} -lt 200 ]; then
            echo "✗ Key too short (${#FULL_KEY} chars). Expected ~400-500 chars."
            echo "Please verify all 5 parts are set correctly in Codemagic."
            exit 1
          fi

          # Remove any whitespace/newlines that might have been added
          FULL_KEY=$(echo "$FULL_KEY" | tr -d '[:space:]')
          echo "After cleanup: ${#FULL_KEY} chars"

          # Decode the key
          echo "$FULL_KEY" | base64 -d > /tmp/api_key.p8 2>&1

          if [ ! -f /tmp/api_key.p8 ]; then
            echo "✗ Private key file not created"
            exit 1
          fi

          FILE_SIZE=$(wc -c < /tmp/api_key.p8)
          echo "✓ Private key decoded: ${FILE_SIZE} bytes"

          # Verify it's a valid PEM key
          if ! grep -q "BEGIN PRIVATE KEY" /tmp/api_key.p8; then
            echo "✗ File does not contain a valid PEM private key"
            echo "First 50 chars of decoded file:"
            head -c 50 /tmp/api_key.p8
            exit 1
          fi

          echo "✓ Key validation passed"
      - name: Configure build environment
        script: |
          echo "export NODE_BINARY=$(which node)" > ios/.xcode.env.local
          cat ios/.xcode.env.local
      - name: Build iOS
        script: |
          export EXPO_NO_DOTENV=1
          export NODE_ENV=production
          export ENTRY_FILE=index.js
          export SKIP_BUNDLING=0
          xcode-project build-ipa \
            --workspace ios/sondare.xcworkspace \
            --scheme sondare \
            --config Release
      - name: Publish to TestFlight
        script: |
          set -e

          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)

          if [ -z "$IPA_PATH" ]; then
            echo "✗ No IPA file found"
            exit 1
          fi

          # Verify the private key file exists and is readable
          if [ ! -f /tmp/api_key.p8 ]; then
            echo "✗ Private key file not found at /tmp/api_key.p8"
            exit 1
          fi

          echo "=== Debug Info ==="
          echo "Key ID: ${APP_STORE_CONNECT_KEY_IDENTIFIER}"
          echo "Issuer ID: ${APP_STORE_CONNECT_ISSUER_ID}"
          echo "Key file size: $(wc -c < /tmp/api_key.p8) bytes"
          echo "Key file first line: $(head -n 1 /tmp/api_key.p8)"
          echo "Key file last line: $(tail -n 1 /tmp/api_key.p8)"
          echo "=================="

          echo "Publishing $IPA_PATH to TestFlight..."

          app-store-connect publish \
            --path "$IPA_PATH" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key @file:/tmp/api_key.p8 \
            --testflight

          echo "✓ Successfully published to TestFlight"
    artifacts:
      - build/ios/ipa/*.ipa

  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      android_signing:
        - keystore_reference
      vars:
        EXPO_TOKEN: $EXPO_TOKEN
      node: 20.19.4
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Prebuild Android project
        script: |
          npm run prebuild:android
      - name: Set build number
        script: |
          cd android && ./gradlew bundleRelease \
            -PversionCode=$(($(google-play get-latest-build-number --package-name "com.sondare.app") + 1))
      - name: Build Android
        script: |
          cd android && ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
