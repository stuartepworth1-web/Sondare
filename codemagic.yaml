workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Sondare
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sondare.app
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.sondare.app
      node: 20.19.4
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $HOME/.cocoapods/repos
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Prebuild iOS project and install pods
        script: |
          set -e
          export EXPO_NO_DOTENV=1
          export NODE_ENV=production

          # Clean any existing ios folder to ensure fresh prebuild
          rm -rf ios

          # Update CocoaPods repo before prebuild
          pod repo update

          echo "Starting Expo prebuild..."
          npx expo prebuild --platform ios --clean
          echo "✓ Prebuild completed"

          # Verify pods were installed
          if [ -d "ios/Pods" ]; then
            echo "✓ CocoaPods installation completed successfully"
          else
            echo "✗ Pods directory not created"
            exit 1
          fi
      - name: Set build number
        script: |
          set -e
          echo "Fetching latest build number from TestFlight..."

          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" || echo "0")
          NEW_BUILD=$((LATEST_BUILD + 1))

          echo "Latest build: $LATEST_BUILD, New build: $NEW_BUILD"
          cd ios && agvtool new-version -all $NEW_BUILD
      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles
      - name: Configure build environment
        script: |
          echo "export NODE_BINARY=$(which node)" > ios/.xcode.env.local
          cat ios/.xcode.env.local
      - name: Build iOS
        script: |
          export EXPO_NO_DOTENV=1
          export NODE_ENV=production
          export ENTRY_FILE=index.js
          xcode-project build-ipa \
            --workspace ios/sondare.xcworkspace \
            --scheme sondare \
            --config Release
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      android_signing:
        - keystore_reference
      vars:
        EXPO_TOKEN: $EXPO_TOKEN
      node: 20.19.4
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Prebuild Android project
        script: |
          npm run prebuild:android
      - name: Set build number
        script: |
          cd android && ./gradlew bundleRelease \
            -PversionCode=$(($(google-play get-latest-build-number --package-name "com.sondare.app") + 1))
      - name: Build Android
        script: |
          cd android && ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
