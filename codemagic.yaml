workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sondare.app
      xcode: latest
      cocoapods: default
      vars:
        EXPO_TOKEN: $EXPO_TOKEN
        APP_STORE_ID: $APP_STORE_ID
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID
        APP_STORE_CONNECT_KEY_IDENTIFIER: $APP_STORE_CONNECT_KEY_IDENTIFIER
        APP_STORE_CONNECT_KEY_CONTENT: $APP_STORE_CONNECT_KEY_CONTENT
      node: 20.19.4
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $HOME/.cocoapods/repos
        - ios/Pods
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Prebuild iOS project
        script: |
          set -e
          export EXPO_NO_DOTENV=1
          export NODE_ENV=production

          echo "Starting Expo prebuild..."

          # Run prebuild without pod install first
          npx expo prebuild --platform ios --clean --no-install

          echo "✓ Prebuild completed, now installing pods..."
      - name: Install CocoaPods dependencies
        script: |
          set -e
          cd ios

          echo "Installing pods..."
          pod install --repo-update

          if [ -d "Pods" ]; then
            echo "✓ CocoaPods installation completed successfully"
            echo "Installed pods:"
            ls -la Pods/ | head -20
          else
            echo "✗ Pods directory not created"
            exit 1
          fi
      - name: Create export options
        script: |
          cat > /Users/builder/export_options.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>provisioningProfiles</key>
            <dict/>
          </dict>
          </plist>
          EOF
      - name: Set build number
        script: |
          cd ios && agvtool new-version -all $(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_ID") + 1))
      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles
      - name: Decode private key
        script: |
          echo "Decoding App Store Connect API key..."

          if [ -z "$APP_STORE_CONNECT_KEY_CONTENT" ]; then
            echo "✗ Error: APP_STORE_CONNECT_KEY_CONTENT is not set"
            exit 1
          fi

          KEY_LENGTH=${#APP_STORE_CONNECT_KEY_CONTENT}
          echo "Key content length: $KEY_LENGTH characters"

          # Check if it's already a PEM key (starts with -----BEGIN)
          if echo "$APP_STORE_CONNECT_KEY_CONTENT" | grep -q "BEGIN PRIVATE KEY"; then
            echo "Content appears to be a plain text PEM key"
            # Handle escaped newlines by using printf to interpret them
            printf "%b" "$APP_STORE_CONNECT_KEY_CONTENT" > /tmp/api_key.p8
          else
            echo "Content appears to be base64 encoded, attempting to decode..."
            echo "$APP_STORE_CONNECT_KEY_CONTENT" | base64 -d > /tmp/api_key.p8 2>&1
          fi

          # Verify the key file
          if [ ! -f /tmp/api_key.p8 ] || [ ! -s /tmp/api_key.p8 ]; then
            echo "✗ Failed to create private key file"
            exit 1
          fi

          FILE_SIZE=$(wc -c < /tmp/api_key.p8)
          echo "✓ Private key file created: ${FILE_SIZE} bytes"

          # Validate it's a proper PEM key
          if ! grep -q "BEGIN PRIVATE KEY" /tmp/api_key.p8; then
            echo "✗ File does not contain a valid PEM private key"
            echo "File contents:"
            cat /tmp/api_key.p8
            exit 1
          fi

          # Validate minimum size (typical P8 keys are 200+ bytes)
          if [ "$FILE_SIZE" -lt 100 ]; then
            echo "✗ Key file is too small (${FILE_SIZE} bytes), likely invalid"
            exit 1
          fi

          echo "✓ Key validation passed"
          head -n 1 /tmp/api_key.p8
          tail -n 1 /tmp/api_key.p8

      - name: Configure build environment
        script: |
          echo "export NODE_BINARY=$(which node)" > ios/.xcode.env.local
          cat ios/.xcode.env.local
      - name: Build iOS
        script: |
          export EXPO_NO_DOTENV=1
          export NODE_ENV=production
          export ENTRY_FILE=index.js
          export SKIP_BUNDLING=0
          xcode-project build-ipa \
            --workspace ios/sondare.xcworkspace \
            --scheme sondare \
            --config Release
      - name: Publish to TestFlight
        script: |
          set -e

          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)

          if [ -z "$IPA_PATH" ]; then
            echo "✗ No IPA file found"
            exit 1
          fi

          # Verify the private key file exists and is readable
          if [ ! -f /tmp/api_key.p8 ]; then
            echo "✗ Private key file not found at /tmp/api_key.p8"
            exit 1
          fi

          echo "Private key file found:"
          ls -lh /tmp/api_key.p8
          echo "First line:"
          head -n 1 /tmp/api_key.p8

          echo "Publishing $IPA_PATH to TestFlight..."

          app-store-connect publish \
            --path "$IPA_PATH" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key @file:/tmp/api_key.p8 \
            --testflight

          echo "✓ Successfully published to TestFlight"
    artifacts:
      - build/ios/ipa/*.ipa

  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      android_signing:
        - keystore_reference
      vars:
        EXPO_TOKEN: $EXPO_TOKEN
      node: 20.19.4
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Prebuild Android project
        script: |
          npm run prebuild:android
      - name: Set build number
        script: |
          cd android && ./gradlew bundleRelease \
            -PversionCode=$(($(google-play get-latest-build-number --package-name "com.sondare.app") + 1))
      - name: Build Android
        script: |
          cd android && ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
