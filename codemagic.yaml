workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sondare.app
      xcode: latest
      cocoapods: default
      vars:
        EXPO_TOKEN: $EXPO_TOKEN
        APP_STORE_ID: $APP_STORE_ID
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID
        APP_STORE_CONNECT_KEY_IDENTIFIER: $APP_STORE_CONNECT_KEY_IDENTIFIER
      node: 20.19.4
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Prebuild iOS project
        script: |
          export EXPO_NO_DOTENV=1
          export NODE_ENV=production
          npm run prebuild:ios
      - name: Create export options
        script: |
          cat > /Users/builder/export_options.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>provisioningProfiles</key>
            <dict/>
          </dict>
          </plist>
          EOF
      - name: Set build number
        script: |
          cd ios && agvtool new-version -all $(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_ID") + 1))
      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles
      - name: Decode private key
        script: |
          echo "Decoding App Store Connect API key..."

          # Access the variable directly from Codemagic environment (not through YAML vars)
          # This avoids YAML processing issues with long base64 strings
          if [ -z "$CM_ENV_APP_STORE_CONNECT_KEY_CONTENT" ]; then
            echo "Error: APP_STORE_CONNECT_KEY_CONTENT environment variable not found"
            echo "Please ensure it's set in Codemagic Environment Variables"
            exit 1
          fi

          # Decode the base64 content directly
          echo "$CM_ENV_APP_STORE_CONNECT_KEY_CONTENT" | base64 -d > /tmp/api_key.p8

          if [ ! -s /tmp/api_key.p8 ]; then
            echo "ERROR: Failed to decode the private key"
            echo "Trying without CM_ENV prefix..."
            echo "$APP_STORE_CONNECT_KEY_CONTENT" | base64 -d > /tmp/api_key.p8
          fi

          if [ -f /tmp/api_key.p8 ] && [ -s /tmp/api_key.p8 ]; then
            echo "✓ Successfully created private key file"
            ls -lh /tmp/api_key.p8
            head -n 1 /tmp/api_key.p8
          else
            echo "✗ Failed to create valid private key file"
            exit 1
          fi
      - name: Configure build environment
        script: |
          echo "export NODE_BINARY=$(which node)" > ios/.xcode.env.local
          cat ios/.xcode.env.local
      - name: Build iOS
        script: |
          export EXPO_NO_DOTENV=1
          export NODE_ENV=production
          export ENTRY_FILE=index.js
          export SKIP_BUNDLING=0
          xcode-project build-ipa \
            --workspace ios/sondare.xcworkspace \
            --scheme sondare \
            --config Release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: /tmp/api_key.p8
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

  android-release:
    name: Android Release
    max_build_duration: 60
    environment:
      android_signing:
        - keystore_reference
      vars:
        EXPO_TOKEN: $EXPO_TOKEN
      node: 20.19.4
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Prebuild Android project
        script: |
          npm run prebuild:android
      - name: Set build number
        script: |
          cd android && ./gradlew bundleRelease \
            -PversionCode=$(($(google-play get-latest-build-number --package-name "com.sondare.app") + 1))
      - name: Build Android
        script: |
          cd android && ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
