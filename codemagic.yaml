workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Sondare
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sondare.app
      vars:
        APP_STORE_CONNECT_KEY_ID: F646ZQHGFZ
        APP_STORE_CONNECT_ISSUER_ID: 018630da-6342-4f29-a4f8-edb5d94978a2
        EXPO_TOKEN: $EXPO_TOKEN
      node: 20.11.1
      xcode: 16.0
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Install EAS CLI
        script: |
          npm install -g eas-cli
      - name: Build iOS app with EAS
        script: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "ERROR: EXPO_TOKEN environment variable is not set in Codemagic"
            exit 1
          fi
          echo "Token is set (length: ${#EXPO_TOKEN} characters)"
          echo "Token prefix: ${EXPO_TOKEN:0:10}..."
          echo "Authenticating with EAS..."
          if ! eas whoami; then
            echo "ERROR: Authentication failed. Please check:"
            echo "1. Token was created at https://expo.dev/settings/access-tokens"
            echo "2. Token is a Personal Access Token (not robot token)"
            echo "3. Token was copied correctly with no spaces"
            echo "4. Token hasn't expired"
            exit 1
          fi
          echo "Authentication successful! Starting build..."
          eas build --platform ios --profile production --non-interactive --wait
      - name: Download build artifact
        script: |
          eas build:download --platform ios --profile production --output=$CM_BUILD_DIR
    artifacts:
      - '*.ipa'
    publishing:
      email:
        recipients:
          - your-email@example.com
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
