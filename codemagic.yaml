workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Sondare
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sondare.app
      vars:
        EXPO_TOKEN: $EXPO_TOKEN
        APP_STORE_CONNECT_KEY_ID: F646ZQHGFZ
        APP_STORE_CONNECT_ISSUER_ID: 018630da-6342-4f29-a4f8-edb5d94978a2
      node: 20.11.1
      xcode: 16.0
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Install EAS CLI
        script: |
          npm install -g eas-cli
      - name: Build iOS app with EAS
        script: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "ERROR: EXPO_TOKEN is not set"
            exit 1
          fi
          export EXPO_TOKEN=$EXPO_TOKEN
          echo "Authenticating with EAS..."
          eas whoami
          echo "Starting build..."
          eas build --platform ios --profile production --non-interactive --wait
      - name: Download build artifact
        script: |
          export EXPO_TOKEN=$EXPO_TOKEN
          eas build:download --platform ios --profile production --output=$CM_BUILD_DIR
    artifacts:
      - '*.ipa'
    publishing:
      email:
        recipients:
          - your-email@example.com
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
