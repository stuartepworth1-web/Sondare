workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Sondare
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sondare.app
      vars:
        BUNDLE_ID: "com.sondare.app"
        APP_STORE_APPLE_ID: 6754073121
        EXPO_PUBLIC_SUPABASE_URL: "https://qplimwowezrqupzxkuio.supabase.co"
        EXPO_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwbGltd293ZXpycXVwenhrdWlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMxOTU0NDUsImV4cCI6MjA3ODc3MTQ0NX0.4DbMHNyYSY0hmn9YIUAObRwDjOioiRvB__E3eStGVX4"
        EXPO_PUBLIC_REVENUECAT_APPLE_API_KEY: "appl_TuLeoFXZpIlCzJVsyUfRWynNCBJ"
      node: 20
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps

      - name: Install Expo CLI
        script: |
          npm install -g expo-cli @expo/ngrok

      - name: Create .env file
        script: |
          echo "EXPO_PUBLIC_SUPABASE_URL=$EXPO_PUBLIC_SUPABASE_URL" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=$EXPO_PUBLIC_SUPABASE_ANON_KEY" >> .env
          echo "EXPO_PUBLIC_REVENUECAT_APPLE_API_KEY=$EXPO_PUBLIC_REVENUECAT_APPLE_API_KEY" >> .env

      - name: Prebuild iOS project
        script: |
          npx expo prebuild --platform ios --clean

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod repo update
          pod install --repo-update
          cd ..
          WORKSPACE=$(find ios -name "*.xcworkspace" -type d | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "ERROR: No workspace was created"
            exit 1
          fi
          echo "Workspace created: $WORKSPACE"
          echo "WORKSPACE_PATH=$WORKSPACE" >> $CM_ENV

      - name: Increment build number
        script: |
          XCODEPROJ=$(find ios -name "*.xcodeproj" -type d | head -1)
          cd "$XCODEPROJ/.."
          NEW_BUILD_NUMBER=$(($(date +%s) / 60))
          echo "Setting build number to: $NEW_BUILD_NUMBER"
          agvtool new-version -all $NEW_BUILD_NUMBER

      - name: Build iOS app
        script: |
          WORKSPACE_NAME=$(basename "$WORKSPACE_PATH" .xcworkspace)
          xcode-project build-ipa \
            --workspace "$WORKSPACE_PATH" \
            --scheme "$WORKSPACE_NAME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - stuart@sondare.me
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - App Store Connect Users
        submit_to_app_store: false
