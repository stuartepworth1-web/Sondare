workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: stuartepworth
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sondare.app
      vars:
        BUNDLE_ID: "com.sondare.app"
        XCODE_WORKSPACE: "ios/sondare.xcworkspace"
        XCODE_SCHEME: "sondare"
      node: 20.11.1
      xcode: 15.4
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Install pods
        script: |
          cd ios && pod install
      - name: Build iOS app
        script: |
          xcodebuild -workspace ios/sondare.xcworkspace \
            -scheme sondare \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/sondare.xcarchive \
            archive
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/sondare.xcarchive \
            -exportOptionsPlist ios/exportOptions.plist \
            -exportPath $CM_BUILD_DIR/export
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - your-email@example.com
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
